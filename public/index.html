<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ピクトグラミング</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-title">
      <span class="logo-mark" aria-hidden="true">P</span>
      <div>
        <h1>ピクトグラミング</h1>
        <p>Java の文でピクトグラムを動かす練習画面</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" id="btn-reset" type="button">リセット</button>
      <button class="btn btn-primary" id="btn-run" type="button">実行</button>
    </div>
  </header>

  <main class="workspace">
    <section class="stage-pane" aria-labelledby="stage-title">
      <div class="pane-header">
        <div>
          <h2 id="stage-title">表示エリア</h2>
          <p>右側に書いた Java 文の結果がここに出ます。</p>
        </div>
        <button class="icon-btn" id="btn-clear-stage" type="button" title="表示だけを初期化">↺</button>
      </div>

      <div class="stage-frame">
        <canvas id="stage-canvas" width="720" height="520" aria-label="ピクトグラムの表示場所"></canvas>
      </div>

      <div class="log-panel" aria-live="polite">
        <div class="log-title">実行結果</div>
        <div class="stage-log" id="stage-log"></div>
      </div>
    </section>

    <section class="editor-pane" aria-labelledby="editor-title">
      <div class="pane-header">
        <div>
          <h2 id="editor-title">Java 入力</h2>
          <p>クラスや main は不要です。一文ずつ書いて実行できます。</p>
        </div>
      </div>

      <textarea id="java-editor" spellcheck="false" aria-label="Java 文の入力欄">moveForward(90);
turnRight(90);
moveForward(70);
setColor("red");
stamp();
turnLeft(45);
moveForward(80);</textarea>

      <div class="command-help">
        <div class="help-title">使える文</div>
        <ul>
          <li><code>moveForward(80);</code> 前に進む</li>
          <li><code>moveBack(40);</code> 後ろに下がる</li>
          <li><code>turnLeft(90);</code> 左に回る</li>
          <li><code>turnRight(90);</code> 右に回る</li>
          <li><code>setColor("blue");</code> 色を変える</li>
          <li><code>stamp();</code> 今の場所に印を残す</li>
          <li><code>wait(1);</code> 少し待つ</li>
        </ul>
      </div>
    </section>
  </main>

  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
